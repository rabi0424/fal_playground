<!doctype html>
<html lang="ja" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>fal playground</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">fal <span>playground</span></div>
  <div class="topbar-actions">
    <button id="themeBtn" class="ghost-btn" title="テーマ切替">自動</button>
  </div>
</header>

<main class="layout">
  <aside class="panel controls">
    <label class="field">
      <span class="label">モデル</span>
      <select id="modelSelect"></select>
    </label>

    <label class="field" id="customModelField" hidden>
      <span class="label">カスタムモデル ID</span>
      <input id="customModel" type="text" placeholder="fal-ai/..." spellcheck="false">
    </label>

    <label class="field prompt-field">
      <span class="label">プロンプト</span>
      <textarea id="prompt" rows="6" placeholder="生成したい画像を英語で記述..." spellcheck="false"></textarea>
    </label>

    <details class="field lora-accordion" id="loraField" hidden open>
      <summary class="label" id="loraLabel">LoRA</summary>
      <div id="loraList" class="lora-list"></div>
      <div class="lora-actions">
        <button id="addLoraBtn" class="ghost-btn small" type="button">＋ LoRA を追加</button>
        <button id="hfOpenBtn" class="ghost-btn small" type="button">Hugging Face から一括登録</button>
      </div>
      <label class="compare-toggle">
        <input type="checkbox" id="compareToggle"> LoRA 比較モード
      </label>

      <div class="field compare-field" id="compareField" hidden>
        <span class="label">比較する LoRA（試行ごと・共通 LoRA に追加されます）</span>
        <div id="variantList"></div>
        <button id="addVariantBtn" class="ghost-btn small" type="button">＋ 試行を追加</button>
      </div>
    </details>

    <div class="row">
      <label class="field">
        <span class="label">サイズ</span>
        <select id="sizeSelect"></select>
      </label>
      <label class="field num-field">
        <span class="label">枚数</span>
        <select id="numImages">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </label>
    </div>

    <div class="field custom-size" id="customSizeField" hidden>
      <div class="size-inputs">
        <label class="size-dim">
          <span class="label">幅</span>
          <input id="customWidth" type="number" min="256" max="2048" step="8" value="1280">
        </label>
        <button id="swapSizeBtn" class="ghost-btn icon-btn" type="button" title="幅と高さを入れ替え" aria-label="幅と高さを入れ替え">⇄</button>
        <label class="size-dim">
          <span class="label">高さ</span>
          <input id="customHeight" type="number" min="256" max="2048" step="8" value="720">
        </label>
      </div>
      <div class="size-hint">
        <span>8 の倍数・256〜2048</span>
        <span id="mpReadout"></span>
      </div>
    </div>

    <details class="advanced">
      <summary>詳細設定</summary>
      <div class="advanced-body">
        <div class="field">
          <span class="label">シード <em>（「固定」にチェック時のみ使用）</em></span>
          <div class="seed-row">
            <input id="seed" type="number" min="0" placeholder="random">
            <label class="seed-lock" title="チェックすると入力したシード値で生成します。オフの間はシードは使われずランダムになります">
              <input type="checkbox" id="seedLock"> 固定
            </label>
          </div>
        </div>
        <div class="row">
          <label class="field">
            <span class="label">ステップ数</span>
            <input id="steps" type="number" min="1" max="100" placeholder="デフォルト">
          </label>
          <label class="field">
            <span class="label">ガイダンス</span>
            <input id="guidance" type="number" min="0" max="30" step="0.5" placeholder="デフォルト">
          </label>
        </div>
      </div>
    </details>

    <div class="generate-area">
      <button id="generateBtn" class="primary-btn">生成する</button>
      <div id="jobList" class="job-list"></div>
      <div id="jobHint" class="job-hint" hidden>コールドスタート時は 1 分ほどかかります</div>
      <div id="error" class="error" role="alert" hidden></div>
    </div>
  </aside>

 <section class="results">
    <div id="detail" class="panel detail">
      <div class="detail-empty">プロンプトを入力して「生成する」を押してください</div>
   </div>

    <section class="gallery-section">
      <div class="gallery-head">
        <h2>ギャラリー</h2>
       <button id="clearHistoryBtn" class="ghost-btn small">すべて削除</button>
     </div>
      <div id="gallery" class="gallery"></div>
   </section>
  </section>
</main>

<dialog id="hfDialog" class="key-dialog hf-dialog">
  <form method="dialog" class="key-form">
    <h2>Hugging Face から LoRA を一括登録</h2>
    <p class="hint">
      公開リポジトリの ID（owner/repo）または URL を入力すると、含まれる .safetensors を一覧表示します。<br>
      選択したものは LoRA ライブラリに登録されます（現在の LoRA 設定行には追加されません）。
    </p>
    <div class="hf-search">
      <input id="hfRepoInput" type="text" placeholder="owner/repo" spellcheck="false" autocomplete="off">
      <button id="hfLoadBtn" class="ghost-btn" type="button">読み込み</button>
    </div>
    <input id="hfFilterInput" class="hf-filter" type="search" placeholder="ファイル名で絞り込み…" spellcheck="false" autocomplete="off">
    <div id="hfStatus" class="status" hidden></div>
    <div id="hfError" class="error" hidden></div>
    <div id="hfList" class="hf-list"></div>
    <div class="key-actions">
      <button value="cancel" class="ghost-btn" formnovalidate>閉じる</button>
      <button value="add" id="hfAddBtn" class="primary-btn" disabled>選択した 0 件を登録</button>
    </div>
  </form>
</dialog>

<div id="lightbox" class="lightbox" hidden>
  <button id="lightboxClose" class="lightbox-close mobile-only" type="button" aria-label="閉じる">✕</button>
  <img alt="">
  <div id="lightboxCounter" class="lightbox-counter mobile-only" hidden></div>
</div>

<script src="app.js"></script>
</body>
</html>
